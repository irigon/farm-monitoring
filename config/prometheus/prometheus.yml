# =============================================================================
# Prometheus — Scrape Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # -- Prometheus self-monitoring ------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # -- Node Exporter — Host metrics (CPU, RAM, disk, network) ------------------
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # -- cAdvisor — Container metrics (per-container CPU, RAM, I/O) --------------
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # -- Redpanda — Broker metrics (topics, partitions, throughput) ---------------
  - job_name: "redpanda"
    metrics_path: "/public_metrics"
    static_configs:
      - targets: ["redpanda:9644"]

  # -- Redpanda Connect — Pipeline metrics (msgs in/out, latency) --------------
  - job_name: "redpanda-connect"
    static_configs:
      - targets: ["redpanda-connect:4195"]
