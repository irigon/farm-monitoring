# Mosquitto configuration — Farm Monitoring
# Docs: https://mosquitto.org/man/mosquitto-conf-5.html

# -- Listener ------------------------------------------------------------------
listener 1883
protocol mqtt

# -- Authentication ------------------------------------------------------------
allow_anonymous false
password_file /mosquitto/config/password_file

# -- Persistence ---------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

# -- Logging -------------------------------------------------------------------
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
