# =============================================================================
# Farm Monitoring — Phase 1 + Phase 2 + Phase 3 + Phase 4
# =============================================================================
# Phase 1: Mosquitto, Redpanda, Redpanda Console, Redpanda Connect, InfluxDB 3
# Phase 2: MinIO (Data Lake)
# Phase 3: Frigate (Cameras & Detection)
# Phase 4: Grafana, Prometheus, Node Exporter, cAdvisor
# =============================================================================

networks:
  monitoring:
    driver: bridge

volumes:
  redpanda-data:
  influxdb-data:
  mosquitto-data:
  grafana-data:
  prometheus-data:
  minio-data:        # Dev: Docker volume. Production: replace with bind mount to external drive
                     # e.g. remove this named volume and use "- /mnt/external-hdd/minio:/data" in the minio service
  frigate-storage:   # Dev: Docker volume. Production: can mount to external drive for recordings

services:

  # ---------------------------------------------------------------------------
  # Mosquitto — MQTT Broker
  # ---------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./config/mosquitto/password_file:/mosquitto/config/password_file:ro
      - mosquitto-data:/mosquitto/data
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Redpanda — Streaming (Kafka API compatible)
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.5
    container_name: redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
    ports:
      - "19092:19092"   # Kafka API (external)
      - "18082:18082"   # Pandaproxy (external)
      - "18081:18081"   # Schema Registry (external)
      - "9644:9644"     # Admin API + metrics
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--api-urls", "localhost:9644"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redpanda Console — UI for topic/message inspection
  # ---------------------------------------------------------------------------
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: "redpanda:9092"
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: "http://redpanda:8081"
      KAFKA_PROTOBUF_ENABLED: "false"
      KAFKA_MSGPACK_ENABLED: "false"
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: "http://redpanda:9644"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # InfluxDB 3 Core — Time-series database
  # ---------------------------------------------------------------------------
  influxdb:
    image: influxdb:3-core
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8181:8181"
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3
      - --http-bind=0.0.0.0:8181
      - --without-auth  # Dev mode: no auth. Remove for production.
    volumes:
      - influxdb-data:/var/lib/influxdb3
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Redpanda Connect — Declarative pipelines (streams mode)
  # ---------------------------------------------------------------------------
  redpanda-connect:
    image: docker.redpanda.com/redpandadata/connect:latest
    container_name: redpanda-connect
    restart: unless-stopped
    ports:
      - "4195:4195"     # HTTP API (streams, metrics, health)
    command:
      - streams
      - --chilled
      - /pipelines/*.yml
    volumes:
      - ./config/redpanda-connect:/pipelines:ro
    environment:
      MQTT_USER: "${MQTT_USER}"
      MQTT_PASSWORD: "${MQTT_PASSWORD}"
      INFLUXDB_TOKEN: "${INFLUXDB_TOKEN}"
      INFLUXDB_DATABASE: "${INFLUXDB_DATABASE}"
    depends_on:
      mosquitto:
        condition: service_started
      redpanda:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Setup — One-shot container to create topics and database
  # ---------------------------------------------------------------------------
  setup:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.5
    container_name: farm-setup
    entrypoint: /bin/bash
    command: /scripts/setup.sh
    volumes:
      - ./scripts:/scripts:ro
    environment:
      INFLUXDB_DATABASE: "${INFLUXDB_DATABASE}"
    depends_on:
      redpanda:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - monitoring
    restart: "no"

  # ===========================================================================
  # Phase 2: Data Lake (MinIO)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible Object Storage (Data Lake)
  # ---------------------------------------------------------------------------
  # Stores media files (clips, snapshots, recordings), exports, and backups.
  # Bucket notifications push events to Redpanda (minio.events topic).
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # MinIO Console (web UI)
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      # Prometheus scraping without bearer token (dev mode)
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
      # Bucket notifications → Redpanda (Kafka-compatible)
      MINIO_NOTIFY_KAFKA_ENABLE_PRIMARY: "on"
      MINIO_NOTIFY_KAFKA_BROKERS_PRIMARY: "redpanda:9092"
      MINIO_NOTIFY_KAFKA_TOPIC_PRIMARY: "minio.events"
    volumes:
      - minio-data:/data
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # MinIO Setup — One-shot: create buckets + configure notifications
  # ---------------------------------------------------------------------------
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    entrypoint: /bin/sh
    command: /scripts/minio-setup.sh
    volumes:
      - ./scripts:/scripts:ro
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - monitoring
    restart: "no"

  # ===========================================================================
  # Phase 3: Cameras & Detection (Frigate)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Frigate — NVR with AI object detection
  # ---------------------------------------------------------------------------
  # Consumes RTSP streams (or test video via go2rtc), runs CPU-based object
  # detection, publishes events to MQTT (frigate/events), saves clips/snapshots.
  # Production: replace test video with real RTSP cameras, add Google Coral TPU.
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: unless-stopped
    ports:
      - "5000:5000"     # Frigate Web UI
      - "8554:8554"     # RTSP restream (go2rtc)
      - "8555:8555/tcp" # WebRTC (TCP)
      - "8555:8555/udp" # WebRTC (UDP)
    shm_size: "256mb"   # Shared memory for ffmpeg (increase for multiple cameras)
    environment:
      FRIGATE_MQTT_USER: "${FRIGATE_MQTT_USER}"
      FRIGATE_MQTT_PASSWORD: "${FRIGATE_MQTT_PASSWORD}"
      GO2RTC_ALLOW_ARBITRARY_EXEC: "true"
    volumes:
      - ./config/frigate/config.yml:/config/config.yml
      - frigate-storage:/media/frigate
      - ./test-data/video:/test-video:ro
    depends_on:
      - mosquitto
    networks:
      - monitoring

  # ===========================================================================
  # Phase 4: Observability
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Grafana — Dashboards & Visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD}"
      GF_FEATURE_TOGGLES_NEWINFLUXDSCONFIGPAGEDESIGN: "true"
      INFLUXDB_DATABASE: "${INFLUXDB_DATABASE}"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      influxdb:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection & storage
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Node Exporter — Host-level metrics (CPU, RAM, disk, network)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # cAdvisor — Container-level metrics (CPU, RAM, I/O per container)
  # ---------------------------------------------------------------------------
  # Port 8080 NOT exposed to host (conflicts with Redpanda Console).
  # Prometheus scrapes cAdvisor internally on the Docker network.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
